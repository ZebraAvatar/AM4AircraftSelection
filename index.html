const fmt = (n) => n === null || isNaN(n) ? "—" : Math.round(n).toLocaleString();
const fmtMoney = n => n < 0 ? `-$${fmt(Math.abs(n))}` : `$${fmt(n)}`;

function getPrices(d, mode) {
  return mode === "easy"
    ? { Y: 0.4 * d + 170, J: 0.8 * d + 560, F: 1.2 * d + 1200 }
    : { Y: 0.3 * d + 150, J: 0.6 * d + 500, F: 0.9 * d + 1000 };
}

// Cost per flight. Fuel/km is speed-independent; A-check scales with flight time.
// Easy mode: speedMult = 1.5 (planes fly faster, shorter flight time, less A-check per trip)
function costPerFlight(pl, d, speedMult) {
  return pl.f * d * 0.70 + (pl.a / pl.h) * d / (pl.s * speedMult);
}

// Minimum seats for ceil(seats*lf) >= D passengers (accounts for ceiling rounding)
function minSeats(D, lf) {
  if (D <= 0) return 0;
  return Math.floor((D - 1) / lf) + 1;
}

function calcPlane(pl, d, dY, dJ, dF, opHrs, mode, lf, maxRunway, stopovers) {
  const speedMult = mode === "easy" ? 1.5 : 1.0;
  const effectiveRange = stopovers ? pl.r * 2 : pl.r;
  if (effectiveRange < d) return null;
  if (maxRunway && pl.w > maxRunway) return null;
  const effectiveSpeed = pl.s * speedMult;
  const maxFlights = Math.ceil(opHrs * effectiveSpeed / d - 1e-9);
  if (maxFlights === 0) return null;

  const prices = getPrices(d, mode);
  const hasDemand = dY > 0 || dJ > 0 || dF > 0;

  let N, yS, jS, fS, coversAll;

  if (!hasDemand) {
    yS = pl.p; jS = 0; fS = 0; coversAll = true;
    N = maxFlights;
  } else {
    // Minimum flights to serve all demand — using corrected ceil-rounding seat formula
    let N_min = maxFlights;
    for (let n = 1; n <= maxFlights; n++) {
      const fSn = minSeats(Math.ceil(dF / n), lf);
      const jSn = minSeats(Math.ceil(dJ / n), lf);
      const ySn = minSeats(Math.ceil(dY / n), lf);
      if (ySn + 2 * jSn + 3 * fSn <= pl.p) { N_min = n; break; }
    }
    N = N_min;

    fS = minSeats(Math.ceil(dF / N), lf);
    jS = minSeats(Math.ceil(dJ / N), lf);
    yS = minSeats(Math.ceil(dY / N), lf);
    const needed = yS + 2 * jS + 3 * fS;
    coversAll = needed <= pl.p;

    if (!coversAll) {
      let rem = pl.p;
      fS = Math.min(fS, Math.floor(rem / 3)); rem -= 3 * fS;
      jS = Math.min(jS, Math.floor(rem / 2)); rem -= 2 * jS;
      yS = Math.min(yS, rem);
    } else {
      // Fill remaining capacity with premium seats (F first, then J) — matches game config
      let excess = pl.p - (yS + 2 * jS + 3 * fS);
      const extraF = Math.floor(excess / 3); excess -= 3 * extraF; fS += extraF;
      const extraJ = Math.floor(excess / 2); excess -= 2 * extraJ; jS += extraJ;
      // Remaining 0-1 slots left empty (no extra Y beyond demand requirement)
    }
  }

  // Passengers actually carried: game uses ceil(seats * lf), capped by demand
  const yC = hasDemand ? Math.min(dY / N, Math.ceil(yS * lf)) : Math.ceil(yS * lf);
  const jC = hasDemand ? Math.min(dJ / N, Math.ceil(jS * lf)) : 0;
  const fC = hasDemand ? Math.min(dF / N, Math.ceil(fS * lf)) : 0;
  const totalPax = yC + jC + fC;

  const rev = yC * prices.Y + jC * prices.J + fC * prices.F;
  const cost = costPerFlight(pl, d, speedMult) + pl.c * totalPax * d * 0.13;
  const profitPerFlight = rev - cost;

  if (profitPerFlight <= 0) return null;

  return {
    name: pl.n, mfr: pl.m, range: pl.r, speed: pl.s, pax: pl.p, price: pl["$"], runway: pl.w,
    flights: N, yS, jS, fS, coversAll,
    rev: Math.round(rev), cost: Math.round(cost),
    profitPerFlight: Math.round(profitPerFlight),
    profitPerDay: Math.round(profitPerFlight * N),
  };
}

        </div>

        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: "1px solid #1e293b", color: "#64748b", fontSize: 11 }}>
                {[["#",null],["Aircraft",null],["Mfr",null],["Flights","flights"],["Config",null],
                  ["Rev/Flt","rev"],["Cost/Flt","cost"],["Profit/Flt","profitPerFlight"],
